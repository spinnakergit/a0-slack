<html>
<head><title>Slack</title></head>
<body>
    <div x-data="{ activeTab: 'credentials', _workspacesText: '', _allowedUsersText: '', _authKeyStatus: '', _authKeyStatusColor: '' }" x-init="
        if (!config.bot) config.bot = {};
        if (!config.bot.token) config.bot.token = '';
        if (!config.bot.app_token) config.bot.app_token = '';
        if (!config.user) config.user = {};
        if (!config.user.token) config.user.token = '';
        if (!config.workspaces) config.workspaces = [];
        if (!config.defaults) config.defaults = {};
        if (!config.defaults.message_limit) config.defaults.message_limit = 50;
        if (!config.memory) config.memory = {};
        if (config.memory.auto_save_summaries === undefined) config.memory.auto_save_summaries = true;
        if (!config.memory.export_format) config.memory.export_format = 'markdown';
        if (!config.polling) config.polling = {};
        if (config.polling.enabled === undefined) config.polling.enabled = false;
        if (!config.polling.interval) config.polling.interval = 60;
        if (!config.chat_bridge) config.chat_bridge = {};
        if (config.chat_bridge.auto_start === undefined) config.chat_bridge.auto_start = false;
        if (!config.chat_bridge.allowed_users) config.chat_bridge.allowed_users = [];
        if (config.chat_bridge.allow_elevated === undefined) config.chat_bridge.allow_elevated = false;
        if (!config.chat_bridge.auth_key) config.chat_bridge.auth_key = '';
        if (!config.chat_bridge.session_timeout) config.chat_bridge.session_timeout = 300;
        if (!config.security) config.security = {};
        if (!config.security.max_message_length) config.security.max_message_length = 4000;
        if (config.security.sanitize_content === undefined) config.security.sanitize_content = true;
        if (config.security.strip_injection_patterns === undefined) config.security.strip_injection_patterns = true;
        _workspacesText = (config.workspaces || []).join('\n');
        _allowedUsersText = (config.chat_bridge.allowed_users || []).join('\n');
    ">
        <template x-if="config">
            <div>
                <!-- Tab Navigation -->
                <div style="display: flex; gap: 0; border-bottom: 2px solid var(--border-color, #e0e0e0); margin-bottom: 16px;">
                    <template x-for="tab in ['credentials', 'settings', 'chat_bridge', 'security']">
                        <button @click="activeTab = tab"
                            :style="'padding: 8px 16px; border: none; background: none; cursor: pointer; font-size: 12px; font-weight: 600; margin-bottom: -2px; color: ' + (activeTab === tab ? '#4A154B' : 'var(--text-secondary, #888)') + '; border-bottom: 2px solid ' + (activeTab === tab ? '#4A154B' : 'transparent')"
                            x-text="tab === 'credentials' ? 'Credentials' : tab === 'settings' ? 'Settings' : tab === 'chat_bridge' ? 'Chat Bridge' : 'Security'"></button>
                    </template>
                </div>

                <!-- Credentials Tab -->
                <div x-show="activeTab === 'credentials'">
                    <div class="section-description">Need help? See the <a href="https://github.com/spinnakergit/a0-slack/blob/main/docs/QUICKSTART.md" target="_blank" style="color: var(--link-color, #4A154B);">Setup Guide</a> for step-by-step instructions.</div>

                    <div class="section-title">Bot Account (Primary)</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Bot Token</div>
                            <div class="field-description">From api.slack.com/apps > OAuth & Permissions. Starts with xoxb-</div>
                        </div>
                        <div class="field-control">
                            <input type="password" x-model="config.bot.token" placeholder="xoxb-...">
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">App-Level Token</div>
                            <div class="field-description">Required for Socket Mode (chat bridge). Enable Socket Mode in app settings. Starts with xapp-</div>
                        </div>
                        <div class="field-control">
                            <input type="password" x-model="config.bot.app_token" placeholder="xapp-...">
                        </div>
                    </div>

                    <div class="section-title">User Token (Optional)</div>
                    <div class="section-description" style="color: #e65100;">User tokens enable search functionality. Only install as a user if needed.</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">User Token</div>
                            <div class="field-description">Optional. Starts with xoxp-</div>
                        </div>
                        <div class="field-control">
                            <input type="password" x-model="config.user.token" placeholder="xoxp-...">
                        </div>
                    </div>
                </div>

                <!-- Settings Tab -->
                <div x-show="activeTab === 'settings'">
                    <div class="section-title">Workspaces</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Allowed Workspace IDs</div>
                            <div class="field-description">One per line. Leave empty to allow all workspaces.</div>
                        </div>
                        <div class="field-control">
                            <textarea rows="3" x-model="_workspacesText" @input="config.workspaces = _workspacesText.split('\n').map(s => s.trim()).filter(Boolean)" placeholder="Leave empty for all workspaces" style="resize: vertical;"></textarea>
                        </div>
                    </div>

                    <div class="section-title">Defaults</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Message Limit</div>
                            <div class="field-description">Maximum messages per channel read (1-200).</div>
                        </div>
                        <div class="field-control">
                            <input type="number" min="1" max="200" x-model.number="config.defaults.message_limit">
                        </div>
                    </div>

                    <div class="section-title">Memory</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Auto-save summaries</div>
                            <div class="field-description">Automatically save conversation summaries to agent memory.</div>
                        </div>
                        <div class="field-control">
                            <label class="toggle"><input type="checkbox" x-model="config.memory.auto_save_summaries"><span class="toggler"></span></label>
                        </div>
                    </div>
                </div>

                <!-- Chat Bridge Tab -->
                <div x-show="activeTab === 'chat_bridge'">
                    <div class="section-title">Chat Bridge</div>
                    <div class="section-description">Route Slack messages through Agent Zero's LLM via Socket Mode. Requires bot token + app token. Channels are managed via the slack_chat tool.</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Auto-start</div>
                            <div class="field-description">Start chat bridge automatically on agent startup.</div>
                        </div>
                        <div class="field-control">
                            <label class="toggle"><input type="checkbox" x-model="config.chat_bridge.auto_start"><span class="toggler"></span></label>
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">User Allowlist</div>
                            <div class="field-description">Only these Slack user IDs can interact with the bot. One per line. Leave empty to allow all workspace members.</div>
                        </div>
                        <div class="field-control">
                            <textarea rows="3" x-model="_allowedUsersText" @input="config.chat_bridge.allowed_users = _allowedUsersText.split('\n').map(s => s.trim()).filter(Boolean)" placeholder="Enter Slack user IDs, one per line (e.g., U01ABC23DEF)" style="resize: vertical; font-family: monospace; font-size: 11px;"></textarea>
                        </div>
                    </div>

                    <div class="section-title">Elevated Mode (2FA)</div>
                    <div class="section-description">When enabled, authenticated users can unlock full Agent Zero access from Slack using <code>!auth &lt;key&gt;</code>. Default mode is restricted (chat only, no tools).</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Allow elevated mode</div>
                        </div>
                        <div class="field-control">
                            <label class="toggle"><input type="checkbox" x-model="config.chat_bridge.allow_elevated"><span class="toggler"></span></label>
                        </div>
                    </div>

                    <div x-show="config.chat_bridge.allow_elevated" style="padding: 10px; background: #fce4ec; border: 1px solid #ef9a9a; border-radius: 6px; margin-bottom: 12px;">
                        <div style="font-size: 11px; font-weight: 700; color: #c62828; margin-bottom: 4px;">SECURITY NOTICE</div>
                        <div style="font-size: 11px; color: #b71c1c; line-height: 1.5;">
                            Elevated mode grants Slack users <strong>full access</strong> to Agent Zero's capabilities, including code execution, file operations, and system tools.
                            <br><br>
                            <strong>Recommended:</strong> A private workspace with only trusted members, a defined User Allowlist above, and short session timeouts.
                        </div>
                    </div>

                    <div x-show="config.chat_bridge.allow_elevated">
                        <div class="field">
                            <div class="field-label">
                                <div class="field-title">Auth Key</div>
                                <div class="field-description">Share this key securely. Users type <code>!auth &lt;key&gt;</code> in Slack to elevate.</div>
                            </div>
                            <div class="field-control" style="display: flex; gap: 6px; align-items: center;">
                                <input type="text" x-model="config.chat_bridge.auth_key" readonly style="flex: 1; font-family: monospace; font-size: 11px; background: var(--bg-secondary, #f5f5f5);">
                                <button class="btn btn-field" @click="
                                    _authKeyStatus = 'Generating...'; _authKeyStatusColor = '#e65100';
                                    (globalThis.fetchApi || fetch)('/api/plugins/slack/slack_config_api', {
                                        method: 'POST',
                                        headers: {'Content-Type': 'application/json'},
                                        body: JSON.stringify({action: 'generate_auth_key'})
                                    }).then(r => r.json()).then(d => {
                                        if (d.auth_key) {
                                            config.chat_bridge.auth_key = d.auth_key;
                                            _authKeyStatus = 'Generated!'; _authKeyStatusColor = '#2e7d32';
                                        } else { _authKeyStatus = d.error || 'Failed'; _authKeyStatusColor = '#c62828'; }
                                        setTimeout(() => _authKeyStatus = '', 3000);
                                    }).catch(() => { _authKeyStatus = 'Error'; _authKeyStatusColor = '#c62828'; });
                                ">Regenerate</button>
                                <button class="btn btn-field" @click="
                                    if (config.chat_bridge.auth_key) {
                                        navigator.clipboard.writeText(config.chat_bridge.auth_key).then(() => {
                                            _authKeyStatus = 'Copied!'; _authKeyStatusColor = '#2e7d32';
                                            setTimeout(() => _authKeyStatus = '', 2000);
                                        });
                                    }
                                ">Copy</button>
                            </div>
                            <span :style="'font-size: 11px; margin-top: 4px; color: ' + _authKeyStatusColor" x-text="_authKeyStatus"></span>
                        </div>

                        <div class="field">
                            <div class="field-label">
                                <div class="field-title">Session Timeout</div>
                                <div class="field-description">Elevated sessions expire after this duration.</div>
                            </div>
                            <div class="field-control">
                                <select x-model.number="config.chat_bridge.session_timeout">
                                    <option value="300">5 minutes</option>
                                    <option value="900">15 minutes</option>
                                    <option value="1800">30 minutes</option>
                                    <option value="3600">1 hour</option>
                                    <option value="7200">2 hours</option>
                                    <option value="14400">4 hours</option>
                                    <option value="0">Never expire</option>
                                </select>
                            </div>
                        </div>

                        <div x-show="config.chat_bridge.session_timeout == 0" style="padding: 8px; background: #fff3e0; border: 1px solid #ffcc80; border-radius: 4px; font-size: 11px; color: #e65100;">
                            <strong>Security warning:</strong> "Never expire" means an elevated session stays active until the bot restarts or the user runs <code>!deauth</code>.
                        </div>
                    </div>
                </div>

                <!-- Security Tab -->
                <div x-show="activeTab === 'security'">
                    <div class="section-title">Security Settings</div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Sanitize content</div>
                            <div class="field-description">Strip zero-width chars and normalize Unicode in messages.</div>
                        </div>
                        <div class="field-control">
                            <label class="toggle"><input type="checkbox" x-model="config.security.sanitize_content"><span class="toggler"></span></label>
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Strip injection patterns</div>
                            <div class="field-description">Remove common prompt injection patterns from incoming messages.</div>
                        </div>
                        <div class="field-control">
                            <label class="toggle"><input type="checkbox" x-model="config.security.strip_injection_patterns"><span class="toggler"></span></label>
                        </div>
                    </div>

                    <div class="field">
                        <div class="field-label">
                            <div class="field-title">Max Message Length</div>
                            <div class="field-description">Maximum characters per message (1-40000).</div>
                        </div>
                        <div class="field-control">
                            <input type="number" min="1" max="40000" x-model.number="config.security.max_message_length">
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </div>
</body>
</html>
